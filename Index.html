<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Pizza Factory</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad390);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:700px;
            background:white;
            border-radius:20px;
            padding:40px;
            text-align:center;
            box-shadow:0 15px 30px rgba(0,0,0,0.2);
        }

        h1{
            color:#ff5722;
            font-size:42px;
            margin-bottom:15px;
        }

        h2{
            color:#444;
            margin-bottom:25px;
        }

        .pizza{
            font-size:90px;
            margin-bottom:20px;
        }

        .menu{
            background:#fff4e6;
            border-radius:12px;
            padding:20px;
            margin-top:20px;
        }

        .menu h3{
            color:#e65100;
            margin-bottom:10px;
        }

        .menu p{
            font-size:20px;
            color:#333;
            margin:8px;
        }

        .status{
            margin-top:30px;
            color:green;
            font-weight:bold;
            font-size:22px;
        }

        footer{
            margin-top:30px;
            color:gray;
            font-size:15px;
        }

        button{
            margin-top:25px;
            padding:12px 25px;
            border:none;
            border-radius:8px;
            background:#ff5722;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#e64a19;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="pizza">🍕</div>

    <h1>Cloud Pizza Factory</h1>

    <h2>Welcome to our Online Pizza Store</h2>

    <div class="menu">

        <h3>Today's Special</h3>

        <p>🍕 Paneer Tikka Pizza</p>

        <p>🥤 Free Soft Drink</p>

        <p>🍟 Garlic Bread Combo</p>

    </div>

    <button onclick="showOffer()">
        Get Today's Offer
    </button>

    <p class="status" id="offer"></p>

    <footer>

        Docker ✔️ |
        Kubernetes ✔️ |
        Cloud Ready ☁️

    </footer>

</div>

<script>

function showOffer(){

document.getElementById("offer").innerHTML =
"🎉 Congratulations! Get 20% OFF on your first Pizza Order!";

}

</script>

</body>
</html>
